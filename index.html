<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Miraj Hackz Voice Assistant</title><link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet"><style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#000000,#08111f,#001f1f,#000000);
    overflow:hidden;
}

body::before{
    content:'';
    position:absolute;
    width:500px;
    height:500px;
    background:#00ffd5;
    filter:blur(180px);
    opacity:0.2;
    top:-100px;
    left:-100px;
    animation:moveGlow 6s infinite alternate;
}

body::after{
    content:'';
    position:absolute;
    width:500px;
    height:500px;
    background:#ff00c8;
    filter:blur(180px);
    opacity:0.15;
    bottom:-120px;
    right:-120px;
    animation:moveGlow2 7s infinite alternate;
}

@keyframes moveGlow{
    0%{transform:translate(0,0);}
    100%{transform:translate(80px,60px);}
}

@keyframes moveGlow2{
    0%{transform:translate(0,0);}
    100%{transform:translate(-80px,-60px);}
}

.container{
    position:relative;
    width:92%;
    max-width:430px;
    padding:30px;
    border-radius:30px;
    background:rgba(255,255,255,0.06);
    border:1px solid rgba(255,255,255,0.15);
    backdrop-filter:blur(18px);
    box-shadow:0 0 35px rgba(0,255,213,0.25);
    text-align:center;
    z-index:10;
    animation:fadeIn 1.2s ease;
}

@keyframes fadeIn{
    from{
        opacity:0;
        transform:translateY(40px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}

.logo{
    font-size:65px;
    animation:float 3s ease-in-out infinite;
}

@keyframes float{
    0%{transform:translateY(0px);}
    50%{transform:translateY(-10px);}
    100%{transform:translateY(0px);}
}

.title{
    margin-top:10px;
    font-size:32px;
    font-weight:700;
    background:linear-gradient(90deg,#00ffd5,#00a2ff,#ff00ea);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
    text-shadow:0 0 20px rgba(0,255,213,0.4);
}

.subtitle{
    margin-top:8px;
    color:#d6d6d6;
    font-size:15px;
    line-height:1.6;
}

.textarea-box{
    margin-top:25px;
}

textarea{
    width:100%;
    height:150px;
    border:none;
    outline:none;
    resize:none;
    border-radius:20px;
    padding:18px;
    background:rgba(255,255,255,0.08);
    color:white;
    font-size:16px;
    transition:0.3s;
    box-shadow:0 0 15px rgba(0,255,213,0.15);
}

textarea:focus{
    transform:scale(1.02);
    box-shadow:0 0 25px rgba(0,255,213,0.35);
}

textarea::placeholder{
    color:#bbbbbb;
}

.btn{
    margin-top:22px;
    width:100%;
    padding:16px;
    border:none;
    border-radius:18px;
    background:linear-gradient(90deg,#00ffd5,#00a2ff,#ff00ea);
    background-size:300% 300%;
    color:white;
    font-size:18px;
    font-weight:700;
    cursor:pointer;
    transition:0.3s;
    animation:gradientMove 4s infinite;
    box-shadow:0 0 25px rgba(0,255,213,0.4);
}

@keyframes gradientMove{
    0%{background-position:0% 50%;}
    50%{background-position:100% 50%;}
    100%{background-position:0% 50%;}
}

.btn:hover{
    transform:scale(1.04);
}

.status{
    margin-top:20px;
    color:#00ffd5;
    font-size:15px;
    min-height:24px;
    animation:pulse 2s infinite;
}

@keyframes pulse{
    0%{opacity:0.6;}
    50%{opacity:1;}
    100%{opacity:0.6;}
}

.footer{
    margin-top:28px;
    font-size:15px;
    font-weight:600;
    background:linear-gradient(90deg,#ffffff,#00ffd5,#ff00ea);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
}

.credit{
    margin-top:10px;
    color:#aaaaaa;
    font-size:13px;
}

</style></head>
<body><div class="container"><div class="logo">🎤</div><div class="title">
MIRAJ HACKZ
</div><div class="subtitle">
Premium AI Voice Assistant <br>
Convert Your Text Into Stylish Voice Instantly
</div><div class="textarea-box">
<textarea id="text" placeholder="✨ Enter Your Text Here..."></textarea>
</div><button class="btn" onclick="generateVoice()">
🔊 GENERATE VOICE
</button><div class="status" id="status"></div><div class="footer">
👑 MODDER KING MIRAJ 👑
</div><div class="credit">
⚡ Premium Voice Generator App ⚡
</div></div><script>

function generateVoice(){

    const text = document.getElementById('text').value;
    const status = document.getElementById('status');

    if(text.trim() === ''){
        status.innerHTML = '❌ Please Enter Some Text';
        return;
    }

    status.innerHTML = '🎧 Generating Premium Voice...';

    setTimeout(() => {

        const speech = new SpeechSynthesisUtterance(text);

        speech.lang = 'en-US';
        speech.rate = 1;
        speech.pitch = 1.1;
        speech.volume = 1;

        window.speechSynthesis.speak(speech);

        status.innerHTML = '✅ Voice Generated Successfully';

    },2000);
}

</script></body>
</html>
